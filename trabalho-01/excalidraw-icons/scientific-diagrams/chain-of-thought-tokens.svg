<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 330" width="580" height="330">
  <rect width="580" height="330" rx="12" fill="#F8F9FA" stroke="#DEE2E6" stroke-width="2"/>
  <text x="290" y="28" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#212529">Chain of Thought — Compute per Token</text>

  <!-- Problem -->
  <text x="20" y="52" font-family="Arial" font-size="11" fill="#666" font-weight="bold">PROBLEM</text>
  <rect x="20" y="58" width="540" height="26" rx="5" fill="#F5F5F5" stroke="#DEE2E6" stroke-width="1"/>
  <text x="30" y="76" font-family="monospace" font-size="11" fill="#555">"Oranges cost $4. Total is $13. She bought 3 apples. How much per apple?"</text>

  <!-- BAD: answer first -->
  <text x="20" y="108" font-family="Arial" font-size="11" fill="#B71C1C" font-weight="bold">❌ BAD — answer in 1 forward pass</text>
  <g font-family="monospace" font-size="12">
    <rect x="20" y="114" width="36" height="26" rx="5" fill="#B71C1C" stroke="#B71C1C" stroke-width="1.5"/>
    <text x="38" y="132" text-anchor="middle" fill="white" font-weight="bold">$3</text>
    <rect x="64" y="114" width="50" height="26" rx="5" fill="#FFEBEE" stroke="#B71C1C" stroke-width="1" opacity="0.5"/>
    <text x="89" y="132" text-anchor="middle" fill="#B71C1C" font-size="10">since</text>
    <rect x="122" y="114" width="70" height="26" rx="5" fill="#FFEBEE" stroke="#B71C1C" stroke-width="1" opacity="0.5"/>
    <text x="157" y="132" text-anchor="middle" fill="#B71C1C" font-size="10">oranges</text>
    <rect x="200" y="114" width="50" height="26" rx="5" fill="#FFEBEE" stroke="#B71C1C" stroke-width="1" opacity="0.5"/>
    <text x="225" y="132" text-anchor="middle" fill="#B71C1C" font-size="10">cost</text>
    <rect x="258" y="114" width="30" height="26" rx="5" fill="#FFEBEE" stroke="#B71C1C" stroke-width="1" opacity="0.5"/>
    <text x="273" y="132" text-anchor="middle" fill="#B71C1C" font-size="10">...</text>
  </g>
  <text x="310" y="132" font-family="Arial" font-size="9" fill="#B71C1C">← all compute at "$3" token</text>
  <text x="310" y="144" font-family="Arial" font-size="9" fill="#B71C1C">← rest is post-hoc justification</text>

  <!-- Arrow -->
  <line x1="290" y1="152" x2="290" y2="162" stroke="#555" stroke-width="2"/>
  <polygon points="285,162 295,162 290,168" fill="#555"/>
  <text x="200" y="166" font-family="Arial" font-size="10" fill="#888">same problem, different token sequence</text>

  <!-- GOOD: step by step -->
  <text x="20" y="188" font-family="Arial" font-size="11" fill="#388E3C" font-weight="bold">✅ GOOD — distribute reasoning across tokens</text>
  <g font-family="monospace" font-size="11">
    <!-- Step 1 -->
    <rect x="20" y="196" width="110" height="26" rx="5" fill="#E3F2FD" stroke="#1976D2" stroke-width="1.5"/>
    <text x="75" y="214" text-anchor="middle" fill="#1976D2">oranges = $4</text>
    <!-- Arrow -->
    <text x="137" y="213" font-family="Arial" font-size="12" fill="#888">→</text>
    <!-- Step 2 -->
    <rect x="152" y="196" width="130" height="26" rx="5" fill="#E3F2FD" stroke="#1976D2" stroke-width="1.5"/>
    <text x="217" y="214" text-anchor="middle" fill="#1976D2">$13 - $4 = $9</text>
    <!-- Arrow -->
    <text x="289" y="213" font-family="Arial" font-size="12" fill="#888">→</text>
    <!-- Step 3 -->
    <rect x="304" y="196" width="120" height="26" rx="5" fill="#E3F2FD" stroke="#1976D2" stroke-width="1.5"/>
    <text x="364" y="214" text-anchor="middle" fill="#1976D2">$9 / 3 = $3</text>
    <!-- Arrow -->
    <text x="431" y="213" font-family="Arial" font-size="12" fill="#888">→</text>
    <!-- Answer -->
    <rect x="446" y="196" width="36" height="26" rx="5" fill="#388E3C" stroke="#388E3C" stroke-width="1.5"/>
    <text x="464" y="214" text-anchor="middle" fill="white" font-weight="bold">$3</text>
  </g>

  <!-- Annotations under each step -->
  <g font-family="Arial" font-size="8" fill="#888">
    <text x="75" y="235" text-anchor="middle">1 forward</text>
    <text x="75" y="244" text-anchor="middle">pass (easy)</text>
    <text x="217" y="235" text-anchor="middle">1 forward</text>
    <text x="217" y="244" text-anchor="middle">pass (easy)</text>
    <text x="364" y="235" text-anchor="middle">1 forward</text>
    <text x="364" y="244" text-anchor="middle">pass (easy)</text>
    <text x="464" y="235" text-anchor="middle">final</text>
    <text x="464" y="244" text-anchor="middle">answer</text>
  </g>

  <!-- Key insight box -->
  <line x1="20" y1="258" x2="560" y2="258" stroke="#DEE2E6" stroke-width="1"/>
  <rect x="20" y="266" width="540" height="50" rx="8" fill="#FFF8E1" stroke="#F9A825" stroke-width="1.5"/>
  <text x="290" y="286" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#F57F17">each token = 1 fixed-size compute step (~100 layers)</text>
  <text x="290" y="302" text-anchor="middle" font-family="Arial" font-size="10" fill="#F57F17">more intermediate tokens = more compute = better reasoning</text>
</svg>
