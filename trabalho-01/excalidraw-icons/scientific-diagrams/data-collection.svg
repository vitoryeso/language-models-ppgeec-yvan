<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 200" width="580" height="200">
  <rect width="580" height="200" rx="12" fill="#F8F9FA" stroke="#DEE2E6" stroke-width="2"/>
  <text x="290" y="28" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#212529">Data Collection Pipeline</text>

  <!-- Internet/Web -->
  <rect x="10" y="55" width="100" height="100" rx="10" fill="#E3F2FD" stroke="#1976D2" stroke-width="2"/>
  <text x="60" y="85" text-anchor="middle" font-family="Arial" font-size="24">🌐</text>
  <text x="60" y="107" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#1565C0">Internet</text>
  <text x="60" y="122" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">WWW Text</text>
  <text x="60" y="136" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">Books, Code</text>
  <text x="60" y="150" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">Articles</text>

  <!-- Arrow -->
  <line x1="112" y1="105" x2="132" y2="105" stroke="#555" stroke-width="2.5"/>
  <polygon points="132,99 144,105 132,111" fill="#555"/>

  <!-- Crawler -->
  <rect x="148" y="55" width="110" height="100" rx="10" fill="#FFF3E0" stroke="#F57C00" stroke-width="2"/>
  <text x="203" y="85" text-anchor="middle" font-family="Arial" font-size="22">🕷️</text>
  <text x="203" y="107" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#E65100">Crawlers</text>
  <text x="203" y="123" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">Scrapy / Selenium</text>
  <text x="203" y="138" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">Rate Limiting</text>
  <text x="203" y="153" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">robots.txt</text>

  <!-- Arrow -->
  <line x1="260" y1="105" x2="280" y2="105" stroke="#555" stroke-width="2.5"/>
  <polygon points="280,99 292,105 280,111" fill="#555"/>

  <!-- Guardrails/Filter -->
  <rect x="297" y="55" width="110" height="100" rx="10" fill="#FCE4EC" stroke="#C2185B" stroke-width="2"/>
  <text x="352" y="82" text-anchor="middle" font-family="Arial" font-size="20">🛡️</text>
  <text x="352" y="102" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#880E4F">Guardrails</text>
  <text x="352" y="118" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">NSFW Filter</text>
  <text x="352" y="133" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">Deduplication</text>
  <text x="352" y="148" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">Compliance</text>

  <!-- Arrow -->
  <line x1="409" y1="105" x2="429" y2="105" stroke="#555" stroke-width="2.5"/>
  <polygon points="429,99 441,105 429,111" fill="#555"/>

  <!-- Storage -->
  <rect x="445" y="55" width="110" height="100" rx="10" fill="#E8F5E9" stroke="#388E3C" stroke-width="2"/>
  <text x="500" y="82" text-anchor="middle" font-family="Arial" font-size="22">🗄️</text>
  <text x="500" y="102" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#1B5E20">Raw Storage</text>
  <text x="500" y="118" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">Object Store</text>
  <text x="500" y="133" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">Data Lake</text>
  <text x="500" y="148" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">Petabytes</text>

  <!-- Bottom: compliance note -->
  <text x="290" y="178" text-anchor="middle" font-family="Arial" font-size="10" fill="#888" font-style="italic">Compliance: GDPR · Copyright · PII Removal · robots.txt</text>
</svg>