<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 260" width="580" height="260">
  <rect width="580" height="260" rx="12" fill="#F8F9FA" stroke="#DEE2E6" stroke-width="2"/>
  <text x="290" y="28" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#212529">Distributed Training</text>

  <!-- Parameter Server -->
  <rect x="215" y="42" width="150" height="56" rx="10" fill="#7C4DFF" />
  <text x="290" y="65" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="white">Parameter Server</text>
  <text x="290" y="82" text-anchor="middle" font-family="Arial" font-size="11" fill="white">Global Model Weights</text>

  <!-- GPU Workers -->
  <g>
    <!-- GPU 1 -->
    <rect x="20" y="145" width="110" height="70" rx="8" fill="#E3F2FD" stroke="#1976D2" stroke-width="2"/>
    <text x="75" y="168" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#1565C0">🖥️ GPU Worker 1</text>
    <text x="75" y="184" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Data Shard 1/4</text>
    <text x="75" y="200" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Forward + Backward</text>

    <!-- GPU 2 -->
    <rect x="155" y="145" width="110" height="70" rx="8" fill="#E8F5E9" stroke="#388E3C" stroke-width="2"/>
    <text x="210" y="168" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#1B5E20">🖥️ GPU Worker 2</text>
    <text x="210" y="184" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Data Shard 2/4</text>
    <text x="210" y="200" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Forward + Backward</text>

    <!-- GPU 3 -->
    <rect x="290" y="145" width="110" height="70" rx="8" fill="#FFF3E0" stroke="#E65100" stroke-width="2"/>
    <text x="345" y="168" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#BF360C">🖥️ GPU Worker 3</text>
    <text x="345" y="184" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Data Shard 3/4</text>
    <text x="345" y="200" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Forward + Backward</text>

    <!-- GPU 4 -->
    <rect x="425" y="145" width="110" height="70" rx="8" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="2"/>
    <text x="480" y="168" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#4A148C">🖥️ GPU Worker 4</text>
    <text x="480" y="184" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Data Shard 4/4</text>
    <text x="480" y="200" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Forward + Backward</text>
  </g>

  <!-- Connecting lines -->
  <g stroke="#7C4DFF" stroke-width="2" fill="none" stroke-dasharray="5,3">
    <line x1="75" y1="145" x2="215" y2="98"/>
    <line x1="210" y1="145" x2="240" y2="98"/>
    <line x1="345" y1="145" x2="340" y2="98"/>
    <line x1="480" y1="145" x2="365" y2="98"/>
  </g>

  <!-- Labels on arrows -->
  <text x="130" y="128" font-family="Arial" font-size="9" fill="#7C4DFF">gradients ↑</text>
  <text x="130" y="138" font-family="Arial" font-size="9" fill="#7C4DFF">weights ↓</text>

  <!-- AllReduce label -->
  <rect x="140" y="228" width="300" height="24" rx="6" fill="#ECEFF1" stroke="#90A4AE" stroke-width="1.5"/>
  <text x="290" y="245" text-anchor="middle" font-family="Arial" font-size="11" fill="#546E7A">AllReduce: aggregate gradients across all workers</text>
</svg>