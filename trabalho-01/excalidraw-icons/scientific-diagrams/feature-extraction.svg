<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 200" width="560" height="200">
  <rect width="560" height="200" rx="12" fill="#F8F9FA" stroke="#DEE2E6" stroke-width="2"/>
  <text x="280" y="28" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#212529">Feature Extraction</text>

  <!-- Raw Input -->
  <rect x="15" y="55" width="110" height="100" rx="8" fill="#E3F2FD" stroke="#1976D2" stroke-width="2"/>
  <text x="70" y="78" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#1565C0">Raw Input</text>
  <text x="70" y="96" text-anchor="middle" font-family="Arial" font-size="20">📄</text>
  <text x="70" y="118" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">"The model</text>
  <text x="70" y="131" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">learns from</text>
  <text x="70" y="144" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">large data..."</text>

  <!-- Arrow -->
  <line x1="127" y1="105" x2="147" y2="105" stroke="#555" stroke-width="2.5"/>
  <polygon points="147,99 159,105 147,111" fill="#555"/>
  <text x="143" y="96" text-anchor="middle" font-family="Arial" font-size="9" fill="#888">tokenize</text>

  <!-- Tokenization -->
  <rect x="163" y="55" width="110" height="100" rx="8" fill="#FFF3E0" stroke="#F57C00" stroke-width="2"/>
  <text x="218" y="78" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#E65100">Tokenization</text>
  <g font-family="monospace" font-size="10">
    <rect x="173" y="85" width="40" height="18" rx="3" fill="#FFE0B2"/>
    <text x="193" y="98" text-anchor="middle" fill="#BF360C">The</text>
    <rect x="218" y="85" width="48" height="18" rx="3" fill="#FFE0B2"/>
    <text x="242" y="98" text-anchor="middle" fill="#BF360C">model</text>
    <rect x="173" y="108" width="50" height="18" rx="3" fill="#FFE0B2"/>
    <text x="198" y="121" text-anchor="middle" fill="#BF360C">learns</text>
    <rect x="228" y="108" width="40" height="18" rx="3" fill="#FFE0B2"/>
    <text x="248" y="121" text-anchor="middle" fill="#BF360C">from</text>
    <text x="218" y="148" text-anchor="middle" font-family="Arial" fill="#888" font-size="10">[15496, 2746, ...]</text>
  </g>

  <!-- Arrow -->
  <line x1="275" y1="105" x2="295" y2="105" stroke="#555" stroke-width="2.5"/>
  <polygon points="295,99 307,105 295,111" fill="#555"/>
  <text x="291" y="96" text-anchor="middle" font-family="Arial" font-size="9" fill="#888">embed</text>

  <!-- Embedding -->
  <rect x="312" y="55" width="110" height="100" rx="8" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="2"/>
  <text x="367" y="78" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#4A148C">Embeddings</text>
  <!-- Vector visualization -->
  <g fill="#CE93D8">
    <rect x="320" y="86" width="8" height="60" rx="1"/>
    <rect x="332" y="100" width="8" height="46" rx="1"/>
    <rect x="344" y="92" width="8" height="54" rx="1"/>
    <rect x="356" y="110" width="8" height="36" rx="1"/>
    <rect x="368" y="86" width="8" height="60" rx="1"/>
    <rect x="380" y="104" width="8" height="42" rx="1"/>
    <rect x="392" y="95" width="8" height="51" rx="1"/>
    <rect x="404" y="116" width="8" height="30" rx="1"/>
  </g>
  <text x="367" y="158" text-anchor="middle" font-family="Arial" font-size="9" fill="#888">d=768 dims</text>

  <!-- Arrow -->
  <line x1="424" y1="105" x2="444" y2="105" stroke="#555" stroke-width="2.5"/>
  <polygon points="444,99 456,105 444,111" fill="#555"/>
  <text x="440" y="96" text-anchor="middle" font-family="Arial" font-size="9" fill="#888">encode</text>

  <!-- Encoded Representation -->
  <rect x="460" y="55" width="90" height="100" rx="8" fill="#E8F5E9" stroke="#388E3C" stroke-width="2"/>
  <text x="505" y="75" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1B5E20">Contextual</text>
  <text x="505" y="87" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1B5E20">Repr.</text>
  <rect x="470" y="95" width="70" height="12" rx="3" fill="#A5D6A7"/>
  <rect x="470" y="112" width="70" height="12" rx="3" fill="#81C784"/>
  <rect x="470" y="129" width="70" height="12" rx="3" fill="#66BB6A"/>
  <rect x="470" y="146" width="70" height="12" rx="3" fill="#4CAF50"/>
  <text x="505" y="167" text-anchor="middle" font-family="Arial" font-size="9" fill="#388E3C">rich features</text>
</svg>