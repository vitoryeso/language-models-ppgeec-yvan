  </g>

  <!-- Arrow down -->
  <text x="200" y="108" font-family="Arial" font-size="10" fill="#888">15% random masking</text>
  <line x1="290" y1="96" x2="290" y2="116" stroke="#555" stroke-width="2"/>
  <polygon points="285,116 295,116 290,126" fill="#555"/>

  <!-- Masked sentence -->
  <text x="20" y="138" font-family="Arial" font-size="11" fill="#666" font-weight="bold">MASKED INPUT</text>
  <g font-family="monospace" font-size="12">
    <rect x="20" y="145" width="60" height="30" rx="5" fill="#E3F2FD" stroke="#1976D2" stroke-width="1.5"/>
    <text x="50" y="165" text-anchor="middle" fill="#1976D2">The</text>
    <rect x="88" y="145" width="60" height="30" rx="5" fill="#E3F2FD" stroke="#1976D2" stroke-width="1.5"/>
    <text x="118" y="165" text-anchor="middle" fill="#1976D2">quick</text>
    <!-- MASKED -->
    <rect x="156" y="145" width="66" height="30" rx="5" fill="#B71C1C" stroke="#B71C1C" stroke-width="1.5"/>
    <text x="189" y="165" text-anchor="middle" fill="white" font-weight="bold">[MASK]</text>
    <rect x="230" y="145" width="54" height="30" rx="5" fill="#E3F2FD" stroke="#1976D2" stroke-width="1.5"/>
    <text x="257" y="165" text-anchor="middle" fill="#1976D2">fox</text>
    <!-- MASKED -->
    <rect x="292" y="145" width="66" height="30" rx="5" fill="#B71C1C" stroke="#B71C1C" stroke-width="1.5"/>
    <text x="325" y="165" text-anchor="middle" fill="white" font-weight="bold">[MASK]</text>
    <rect x="366" y="145" width="54" height="30" rx="5" fill="#E3F2FD" stroke="#1976D2" stroke-width="1.5"/>
    <text x="393" y="165" text-anchor="middle" fill="#1976D2">over</text>
  </g>

  <!-- Predictions -->
  <text x="20" y="195" font-family="Arial" font-size="11" fill="#666" font-weight="bold">MODEL PREDICTS</text>
  <rect x="156" y="192" width="66" height="24" rx="5" fill="#388E3C"/>
  <text x="189" y="209" text-anchor="middle" font-family="monospace" font-size="12" fill="white">brown ✓</text>
  <rect x="292" y="192" width="66" height="24" rx="5" fill="#388E3C"/>
