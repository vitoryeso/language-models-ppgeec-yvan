<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 220" width="580" height="220">
  <rect width="580" height="220" rx="12" fill="#F8F9FA" stroke="#DEE2E6" stroke-width="2"/>
  <text x="290" y="28" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#212529">Mask Permutation (MLM)</text>

  <!-- Original sentence -->
  <text x="20" y="55" font-family="Arial" font-size="11" fill="#666" font-weight="bold">ORIGINAL</text>
  <g font-family="monospace" font-size="12">
    <rect x="20" y="62" width="60" height="30" rx="5" fill="#E3F2FD" stroke="#1976D2" stroke-width="1.5"/>
    <text x="50" y="82" text-anchor="middle" fill="#1976D2">The</text>
