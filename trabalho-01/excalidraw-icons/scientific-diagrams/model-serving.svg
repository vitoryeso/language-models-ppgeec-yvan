<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 220" width="560" height="220">
  <rect width="560" height="220" rx="12" fill="#F8F9FA" stroke="#DEE2E6" stroke-width="2"/>
  <text x="280" y="28" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#212529">Model Serving Architecture</text>

  <!-- Client -->
  <rect x="15" y="80" width="90" height="60" rx="8" fill="#E3F2FD" stroke="#1976D2" stroke-width="2"/>
  <text x="60" y="105" text-anchor="middle" font-family="Arial" font-size="22">💻</text>
  <text x="60" y="127" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#1565C0">Client</text>

  <!-- HTTP Arrow -->
  <line x1="108" y1="110" x2="128" y2="110" stroke="#555" stroke-width="2.5"/>
  <polygon points="128,104 140,110 128,116" fill="#555"/>
  <text x="124" y="100" text-anchor="middle" font-family="Arial" font-size="9" fill="#888">HTTP/gRPC</text>

  <!-- API Gateway -->
  <rect x="145" y="70" width="100" height="80" rx="8" fill="#FFF3E0" stroke="#F57C00" stroke-width="2"/>
  <text x="195" y="98" text-anchor="middle" font-family="Arial" font-size="20">🔀</text>
  <text x="195" y="116" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#E65100">API Gateway</text>
  <text x="195" y="130" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Load Balance</text>
  <text x="195" y="143" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Auth / Rate Limit</text>

  <!-- Arrow -->
  <line x1="248" y1="110" x2="268" y2="110" stroke="#555" stroke-width="2.5"/>
  <polygon points="268,104 280,110 268,116" fill="#555"/>

  <!-- Inference Servers -->
  <rect x="285" y="55" width="115" height="110" rx="8" fill="#E8F5E9" stroke="#388E3C" stroke-width="2"/>
  <text x="342" y="80" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#1B5E20">Inference Servers</text>
  <rect x="295" y="87" width="95" height="22" rx="4" fill="#C8E6C9" stroke="#388E3C" stroke-width="1"/>
  <text x="342" y="103" text-anchor="middle" font-family="Arial" font-size="10" fill="#1B5E20">🖥️ GPU Instance 1</text>
  <rect x="295" y="113" width="95" height="22" rx="4" fill="#C8E6C9" stroke="#388E3C" stroke-width="1"/>
  <text x="342" y="129" text-anchor="middle" font-family="Arial" font-size="10" fill="#1B5E20">🖥️ GPU Instance 2</text>
  <rect x="295" y="139" width="95" height="20" rx="4" fill="#A5D6A7" stroke="#388E3C" stroke-width="1"/>
  <text x="342" y="154" text-anchor="middle" font-family="Arial" font-size="10" fill="#1B5E20">🖥️ GPU Instance N</text>

  <!-- Arrow -->
  <line x1="403" y1="110" x2="423" y2="110" stroke="#555" stroke-width="2.5"/>
  <polygon points="423,104 435,110 423,116" fill="#555"/>

  <!-- Observability stack -->
  <rect x="440" y="60" width="100" height="100" rx="8" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="2"/>
  <text x="490" y="83" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#4A148C">Observability</text>
  <text x="490" y="99" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">📊 Metrics</text>
  <text x="490" y="114" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">📋 Logging</text>
  <text x="490" y="129" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">🔔 Alerting</text>
  <text x="490" y="144" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">📈 Tracing</text>

  <text x="280" y="194" text-anchor="middle" font-family="Arial" font-size="10" fill="#888" font-style="italic">Triton Serving · TF Serving · vLLM · FastAPI</text>
</svg>