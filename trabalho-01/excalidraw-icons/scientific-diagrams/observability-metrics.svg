<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 220" width="560" height="220">
  <rect width="560" height="220" rx="12" fill="#1E1E2E" stroke="#6C63FF" stroke-width="2"/>
  <text x="280" y="28" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#CDD6F4">Observability &amp; Metrics</text>

  <!-- Loss chart -->
  <rect x="20" y="44" width="155" height="90" rx="8" fill="#2A2A3E" stroke="#6C63FF" stroke-width="1.5"/>
  <text x="97" y="62" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#CDD6F4">Training Loss</text>
  <polyline points="30,120 55,108 80,95 105,82 130,75 155,70 165,65" stroke="#F38BA8" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <line x1="30" y1="125" x2="165" y2="125" stroke="#555" stroke-width="1"/>
  <line x1="30" y1="65" x2="30" y2="125" stroke="#555" stroke-width="1"/>
  <text x="97" y="136" text-anchor="middle" font-family="Arial" font-size="9" fill="#888">epochs →</text>

  <!-- Throughput chart -->
  <rect x="190" y="44" width="155" height="90" rx="8" fill="#2A2A3E" stroke="#6C63FF" stroke-width="1.5"/>
  <text x="267" y="62" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#CDD6F4">Throughput (tok/s)</text>
  <g fill="#A6E3A1">
    <rect x="200" y="100" width="16" height="25" rx="2"/>
    <rect x="222" y="85" width="16" height="40" rx="2"/>
    <rect x="244" y="90" width="16" height="35" rx="2"/>
    <rect x="266" y="78" width="16" height="47" rx="2"/>
    <rect x="288" y="80" width="16" height="45" rx="2"/>
    <rect x="310" y="72" width="16" height="53" rx="2"/>
    <rect x="332" y="70" width="12" height="55" rx="2"/>
  </g>
  <line x1="200" y1="125" x2="335" y2="125" stroke="#555" stroke-width="1"/>
  <text x="267" y="136" text-anchor="middle" font-family="Arial" font-size="9" fill="#888">GPU workers →</text>

  <!-- GPU Util gauge -->
  <rect x="360" y="44" width="175" height="90" rx="8" fill="#2A2A3E" stroke="#6C63FF" stroke-width="1.5"/>
  <text x="447" y="62" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#CDD6F4">GPU Utilization</text>
  <circle cx="447" cy="100" r="30" fill="none" stroke="#313244" stroke-width="10"/>
  <circle cx="447" cy="100" r="30" fill="none" stroke="#89B4FA" stroke-width="10" stroke-dasharray="155 44" stroke-linecap="round" transform="rotate(-90 447 100)"/>
  <text x="447" y="105" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#89B4FA">87%</text>
  <text x="447" y="136" text-anchor="middle" font-family="Arial" font-size="9" fill="#888">avg across cluster</text>

  <!-- Metrics cards -->
  <g>
    <rect x="20" y="148" width="115" height="50" rx="8" fill="#2A2A3E" stroke="#F38BA8" stroke-width="1.5"/>
    <text x="77" y="167" text-anchor="middle" font-family="Arial" font-size="10" fill="#888">Perplexity</text>
    <text x="77" y="187" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#F38BA8">12.4</text>

    <rect x="145" y="148" width="115" height="50" rx="8" fill="#2A2A3E" stroke="#A6E3A1" stroke-width="1.5"/>
    <text x="202" y="167" text-anchor="middle" font-family="Arial" font-size="10" fill="#888">Accuracy</text>
    <text x="202" y="187" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#A6E3A1">94.2%</text>

    <rect x="270" y="148" width="115" height="50" rx="8" fill="#2A2A3E" stroke="#F9E2AF" stroke-width="1.5"/>
    <text x="327" y="167" text-anchor="middle" font-family="Arial" font-size="10" fill="#888">Latency p99</text>
    <text x="327" y="187" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#F9E2AF">42ms</text>

    <rect x="395" y="148" width="140" height="50" rx="8" fill="#2A2A3E" stroke="#89B4FA" stroke-width="1.5"/>
    <text x="465" y="167" text-anchor="middle" font-family="Arial" font-size="10" fill="#888">Requests/min</text>
    <text x="465" y="187" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#89B4FA">12,450</text>
  </g>
</svg>