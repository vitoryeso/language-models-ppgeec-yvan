<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 330" width="580" height="330">
  <rect width="580" height="330" rx="12" fill="#F8F9FA" stroke="#DEE2E6" stroke-width="2"/>
  <text x="290" y="28" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#212529">Supervised Fine-Tuning (SFT)</text>

  <!-- BASE MODEL behavior -->
  <text x="20" y="52" font-family="Arial" font-size="11" fill="#B71C1C" font-weight="bold">BASE MODEL — completes text like a web page</text>
  <g font-family="monospace" font-size="11">
    <rect x="20" y="58" width="540" height="26" rx="5" fill="#FFEBEE" stroke="#B71C1C" stroke-width="1"/>
    <text x="30" y="76" fill="#B71C1C">"What is 2+2?" → "What is 2+3? What is 2+4? Quiz page..."</text>
  </g>

  <!-- Arrow -->
  <text x="240" y="102" font-family="Arial" font-size="10" fill="#888">train on conversation dataset (same algorithm, new data)</text>
  <line x1="290" y1="88" x2="290" y2="106" stroke="#555" stroke-width="2"/>
  <polygon points="285,106 295,106 290,112" fill="#555"/>

  <!-- SFT TRAINING DATA format -->
  <text x="20" y="128" font-family="Arial" font-size="11" fill="#666" font-weight="bold">SFT TRAINING DATA — conversation tokens</text>
  <g font-family="monospace" font-size="10">
    <!-- Row 1: system -->
    <rect x="20" y="135" width="66" height="24" rx="4" fill="#7B1FA2" stroke="#7B1FA2" stroke-width="1.2"/>
    <text x="53" y="151" text-anchor="middle" fill="white">im_start</text>
    <rect x="92" y="135" width="56" height="24" rx="4" fill="#E1BEE7" stroke="#7B1FA2" stroke-width="1.2"/>
    <text x="120" y="151" text-anchor="middle" fill="#7B1FA2">system</text>
    <rect x="154" y="135" width="200" height="24" rx="4" fill="#F3E5F5" stroke="#CE93D8" stroke-width="1"/>
    <text x="254" y="151" text-anchor="middle" fill="#7B1FA2" font-size="9">You are a helpful assistant.</text>
    <rect x="360" y="135" width="56" height="24" rx="4" fill="#7B1FA2" stroke="#7B1FA2" stroke-width="1.2"/>
    <text x="388" y="151" text-anchor="middle" fill="white">im_end</text>

    <!-- Row 2: user -->
    <rect x="20" y="165" width="66" height="24" rx="4" fill="#7B1FA2" stroke="#7B1FA2" stroke-width="1.2"/>
    <text x="53" y="181" text-anchor="middle" fill="white">im_start</text>
    <rect x="92" y="165" width="44" height="24" rx="4" fill="#E3F2FD" stroke="#1976D2" stroke-width="1.2"/>
    <text x="114" y="181" text-anchor="middle" fill="#1976D2">user</text>
    <rect x="142" y="165" width="150" height="24" rx="4" fill="#E3F2FD" stroke="#1976D2" stroke-width="1"/>
    <text x="217" y="181" text-anchor="middle" fill="#1976D2" font-size="9">What is 2+2?</text>
    <rect x="298" y="165" width="56" height="24" rx="4" fill="#7B1FA2" stroke="#7B1FA2" stroke-width="1.2"/>
    <text x="326" y="181" text-anchor="middle" fill="white">im_end</text>

    <!-- Row 3: assistant (this is the training target) -->
    <rect x="20" y="195" width="66" height="24" rx="4" fill="#7B1FA2" stroke="#7B1FA2" stroke-width="1.2"/>
    <text x="53" y="211" text-anchor="middle" fill="white">im_start</text>
    <rect x="92" y="195" width="70" height="24" rx="4" fill="#388E3C" stroke="#388E3C" stroke-width="1.2"/>
    <text x="127" y="211" text-anchor="middle" fill="white">assistant</text>
    <rect x="168" y="195" width="290" height="24" rx="4" fill="#E8F5E9" stroke="#388E3C" stroke-width="1"/>
    <text x="313" y="211" text-anchor="middle" fill="#388E3C" font-size="9">2+2 equals 4. Is there anything else...</text>
    <rect x="464" y="195" width="56" height="24" rx="4" fill="#7B1FA2" stroke="#7B1FA2" stroke-width="1.2"/>
    <text x="492" y="211" text-anchor="middle" fill="white">im_end</text>
  </g>

  <!-- Annotation: loss only on assistant tokens -->
  <line x1="92" y1="222" x2="520" y2="222" stroke="#388E3C" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="370" y="236" font-family="Arial" font-size="9" fill="#388E3C" font-weight="bold">↑ loss computed only on assistant tokens</text>

  <!-- Legend -->
  <line x1="20" y1="248" x2="560" y2="248" stroke="#DEE2E6" stroke-width="1"/>
  <text x="20" y="265" font-family="Arial" font-size="11" fill="#666" font-weight="bold">AFTER SFT</text>
  <g font-family="monospace" font-size="11">
    <rect x="20" y="272" width="540" height="26" rx="5" fill="#E8F5E9" stroke="#388E3C" stroke-width="1"/>
    <text x="30" y="290" fill="#388E3C">"What is 2+2?" → "2+2 equals 4. How can I help you?"</text>
  </g>

  <!-- Bottom legend -->
  <rect x="20" y="306" width="14" height="14" rx="3" fill="#7B1FA2"/>
  <text x="40" y="317" font-family="Arial" font-size="9" fill="#666">special tokens (new)</text>
  <rect x="170" y="306" width="14" height="14" rx="3" fill="#E3F2FD" stroke="#1976D2" stroke-width="1"/>
  <text x="190" y="317" font-family="Arial" font-size="9" fill="#666">user turn</text>
  <rect x="270" y="306" width="14" height="14" rx="3" fill="#388E3C"/>
  <text x="290" y="317" font-family="Arial" font-size="9" fill="#666">assistant turn (training target)</text>
  <text x="480" y="317" font-family="Arial" font-size="9" fill="#888">same algo, new data</text>
</svg>
