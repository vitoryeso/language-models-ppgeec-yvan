<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <rect width="100" height="100" rx="16" fill="#231F20"/>
  <!-- Kafka logo: central node + connections -->
  <circle cx="50" cy="50" r="10" fill="white"/>
  <!-- Top node -->
  <circle cx="50" cy="18" r="7" fill="white"/>
  <line x1="50" y1="25" x2="50" y2="40" stroke="white" stroke-width="2.5"/>
  <!-- Bottom-left node -->
  <circle cx="24" cy="72" r="7" fill="white"/>
  <line x1="30" y1="67" x2="44" y2="57" stroke="white" stroke-width="2.5"/>
  <!-- Bottom-right node -->
  <circle cx="76" cy="72" r="7" fill="white"/>
  <line x1="70" y1="67" x2="56" y2="57" stroke="white" stroke-width="2.5"/>
  <text x="50" y="94" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="white">Apache Kafka</text>
</svg>