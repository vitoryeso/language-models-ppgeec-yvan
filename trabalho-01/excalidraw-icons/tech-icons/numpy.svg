<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <rect width="100" height="100" rx="16" fill="#013243"/>
  <!-- Array grid -->
  <g fill="none" stroke="#4DABCF" stroke-width="2">
    <!-- Top array -->
    <rect x="20" y="20" width="28" height="10" rx="1"/>
    <rect x="20" y="32" width="28" height="10" rx="1"/>
    <rect x="20" y="44" width="28" height="10" rx="1"/>
    <!-- Right array -->
    <rect x="52" y="20" width="10" height="28" rx="1"/>
    <rect x="64" y="20" width="10" height="28" rx="1"/>
    <rect x="76" y="20" width="10" height="28" rx="1"/>
  </g>
  <!-- N letter -->
  <text x="50" y="72" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#4DABCF">NumPy</text>
  <text x="50" y="90" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">NumPy</text>
</svg>