<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" width="480" height="200">
  <style>
    .step { rx: 8; stroke-width: 2; }
    .txt { font-family: monospace; font-size: 10px; fill: #333; text-anchor: middle; }
    .arrow { stroke: #E8A838; stroke-width: 2; fill: none; marker-end: url(#ac); }
  </style>
  <defs>
    <marker id="ac" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#E8A838"/>
    </marker>
  </defs>
  <!-- Question -->
  <rect x="10" y="60" width="80" height="55" class="step" fill="#E8F0FE" stroke="#4A90D9"/>
  <text x="50" y="82" class="txt" font-weight="bold" fill="#2C5F8A">Question</text>
  <text x="50" y="98" class="txt" font-size="8" fill="#2C5F8A">Input prompt</text>
  <line x1="95" y1="87" x2="115" y2="87" class="arrow"/>
  <!-- Step 1 -->
  <rect x="120" y="55" width="75" height="65" class="step" fill="#FFF3E0" stroke="#E8A838"/>
  <text x="157" y="77" class="txt" font-weight="bold" fill="#B07A20">Step 1</text>
  <text x="157" y="92" class="txt" font-size="8" fill="#B07A20">Think...</text>
  <text x="157" y="105" class="txt" font-size="8" fill="#B07A20">Reason</text>
  <line x1="200" y1="87" x2="215" y2="87" class="arrow"/>
  <!-- Step 2 -->
  <rect x="220" y="55" width="75" height="65" class="step" fill="#FFF3E0" stroke="#E8A838"/>
  <text x="257" y="77" class="txt" font-weight="bold" fill="#B07A20">Step 2</text>
  <text x="257" y="92" class="txt" font-size="8" fill="#B07A20">Compute</text>
  <text x="257" y="105" class="txt" font-size="8" fill="#B07A20">Verify</text>
  <line x1="300" y1="87" x2="315" y2="87" class="arrow"/>
  <!-- Step 3 -->
  <rect x="320" y="55" width="75" height="65" class="step" fill="#FFF3E0" stroke="#E8A838"/>
  <text x="357" y="77" class="txt" font-weight="bold" fill="#B07A20">Step 3</text>
  <text x="357" y="92" class="txt" font-size="8" fill="#B07A20">Conclude</text>
  <text x="357" y="105" class="txt" font-size="8" fill="#B07A20">Confirm</text>
  <line x1="400" y1="87" x2="415" y2="87" class="arrow"/>
  <!-- Answer -->
  <rect x="420" y="60" width="55" height="55" class="step" fill="#E8F5E9" stroke="#6BB86B"/>
  <text x="447" y="82" class="txt" font-weight="bold" fill="#3D7A3D">Answer</text>
  <text x="447" y="98" class="txt" font-size="8" fill="#3D7A3D">Final</text>
  <!-- Thinking bubble decoration -->
  <text x="240" y="30" font-family="monospace" font-size="14" fill="#E8A838" text-anchor="middle">💭 Chain of Thought Reasoning</text>
  <text x="240" y="160" class="txt" font-size="9" fill="#888">Distribute computation across many tokens</text>
</svg>