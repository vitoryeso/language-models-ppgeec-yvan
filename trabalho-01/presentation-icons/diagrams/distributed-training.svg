<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 320" width="450" height="320">
  <style>
    .gpu { fill: #76B900; stroke: #5A8A00; stroke-width: 2; rx: 8; }
    .master { fill: #4A90D9; stroke: #2C5F8A; stroke-width: 2; rx: 10; }
    .txt { font-family: monospace; font-size: 11px; fill: white; text-anchor: middle; }
    .ltxt { font-family: monospace; font-size: 10px; fill: #555; text-anchor: middle; }
    .conn { stroke: #888; stroke-width: 1.5; stroke-dasharray: 5,3; }
    .arrow { stroke: #E8A838; stroke-width: 2; fill: none; marker-end: url(#ao); }
  </style>
  <defs>
    <marker id="ao" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#E8A838"/>
    </marker>
  </defs>
  <!-- Master Node -->
  <rect x="150" y="20" width="150" height="50" class="master"/>
  <text x="225" y="42" class="txt" font-size="13" font-weight="bold">Parameter Server</text>
  <text x="225" y="58" class="txt" font-size="10">Gradient Aggregation</text>
  <!-- GPU Workers -->
  <rect x="20" y="120" width="100" height="60" class="gpu"/>
  <text x="70" y="147" class="txt" font-weight="bold">GPU 0</text>
  <text x="70" y="162" class="txt" font-size="9">Worker</text>
  <rect x="140" y="120" width="100" height="60" class="gpu"/>
  <text x="190" y="147" class="txt" font-weight="bold">GPU 1</text>
  <text x="190" y="162" class="txt" font-size="9">Worker</text>
  <rect x="260" y="120" width="100" height="60" class="gpu"/>
  <text x="310" y="147" class="txt" font-weight="bold">GPU 2</text>
  <text x="310" y="162" class="txt" font-size="9">Worker</text>
  <rect x="380" y="120" width="55" height="60" class="gpu"/>
  <text x="407" y="147" class="txt" font-weight="bold">...</text>
  <!-- Connections -->
  <line x1="70" y1="120" x2="190" y2="70" class="conn"/>
  <line x1="190" y1="120" x2="225" y2="70" class="conn"/>
  <line x1="310" y1="120" x2="260" y2="70" class="conn"/>
  <!-- Data shards -->
  <rect x="20" y="210" width="100" height="35" rx="4" fill="#FFF3E0" stroke="#E8A838" stroke-width="1.5"/>
  <text x="70" y="232" class="ltxt">Shard 0</text>
  <rect x="140" y="210" width="100" height="35" rx="4" fill="#FFF3E0" stroke="#E8A838" stroke-width="1.5"/>
  <text x="190" y="232" class="ltxt">Shard 1</text>
  <rect x="260" y="210" width="100" height="35" rx="4" fill="#FFF3E0" stroke="#E8A838" stroke-width="1.5"/>
  <text x="310" y="232" class="ltxt">Shard 2</text>
  <!-- Arrows data to gpus -->
  <line x1="70" y1="210" x2="70" y2="185" class="arrow"/>
  <line x1="190" y1="210" x2="190" y2="185" class="arrow"/>
  <line x1="310" y1="210" x2="310" y2="185" class="arrow"/>
  <!-- AllReduce label -->
  <rect x="130" y="270" width="190" height="35" rx="6" fill="#F3E5F5" stroke="#9C27B0" stroke-width="1.5"/>
  <text x="225" y="292" class="ltxt" fill="#6A1B9A" font-weight="bold">AllReduce / Ring Comm</text>
</svg>