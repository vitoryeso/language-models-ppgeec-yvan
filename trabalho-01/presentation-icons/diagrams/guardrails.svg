<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 240" width="380" height="240">
  <style>
    .box { rx: 8; stroke-width: 2; }
    .txt { font-family: monospace; font-size: 10px; text-anchor: middle; }
    .arrow { stroke: #666; stroke-width: 1.5; fill: none; marker-end: url(#ag); }
  </style>
  <defs>
    <marker id="ag" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#666"/>
    </marker>
  </defs>
  <text x="190" y="20" class="txt" font-size="13" font-weight="bold" fill="#333">Guardrails Pipeline</text>
  <!-- Input -->
  <rect x="20" y="60" width="80" height="40" class="box" fill="#78909C" stroke="#546E7A"/>
  <text x="60" y="85" class="txt" fill="white" font-weight="bold">User Input</text>
  <line x1="105" y1="80" x2="125" y2="80" class="arrow"/>
  <!-- Input Guard -->
  <rect x="130" y="45" width="100" height="70" class="box" fill="#D94A4A" stroke="#A02C2C"/>
  <text x="180" y="68" class="txt" fill="white" font-weight="bold">Input Guard</text>
  <text x="180" y="83" class="txt" fill="white" font-size="8">Toxicity Filter</text>
  <text x="180" y="96" class="txt" fill="white" font-size="8">Injection Detect</text>
  <text x="180" y="108" class="txt" fill="white" font-size="8">PII Redaction</text>
  <line x1="180" y1="120" x2="180" y2="140" class="arrow"/>
  <!-- LLM -->
  <rect x="140" y="145" width="80" height="40" class="box" fill="#4A90D9" stroke="#2C5F8A"/>
  <text x="180" y="170" class="txt" fill="white" font-weight="bold">LLM</text>
  <line x1="225" y1="165" x2="245" y2="165" class="arrow"/>
  <!-- Output Guard -->
  <rect x="250" y="130" width="110" height="70" class="box" fill="#E8A838" stroke="#B07A20"/>
  <text x="305" y="152" class="txt" fill="white" font-weight="bold">Output Guard</text>
  <text x="305" y="167" class="txt" fill="white" font-size="8">Hallucination</text>
  <text x="305" y="180" class="txt" fill="white" font-size="8">Safety Check</text>
  <text x="305" y="193" class="txt" fill="white" font-size="8">Format Valid</text>
  <!-- Blocked -->
  <rect x="260" y="55" width="75" height="30" rx="4" fill="#FFEBEE" stroke="#D94A4A" stroke-width="1"/>
  <text x="297" y="74" class="txt" fill="#D94A4A" font-weight="bold">🚫 Block</text>
  <line x1="230" y1="70" x2="260" y2="70" class="arrow" stroke="#D94A4A"/>
</svg>