<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 160" width="420" height="160">
  <style>
    .tok { rx: 4; stroke-width: 1.5; }
    .txt { font-family: monospace; font-size: 11px; text-anchor: middle; }
  </style>
  <!-- Original -->
  <text x="210" y="20" class="txt" font-weight="bold" fill="#333">Masked Language Modeling (MLM)</text>
  <!-- Input sequence -->
  <rect x="20" y="40" width="60" height="30" class="tok" fill="#4A90D9" stroke="#2C5F8A"/>
  <text x="50" y="60" class="txt" fill="white">The</text>
  <rect x="90" y="40" width="60" height="30" class="tok" fill="#D94A4A" stroke="#A02C2C"/>
  <text x="120" y="60" class="txt" fill="white">[MASK]</text>
  <rect x="160" y="40" width="60" height="30" class="tok" fill="#4A90D9" stroke="#2C5F8A"/>
  <text x="190" y="60" class="txt" fill="white">sat</text>
  <rect x="230" y="40" width="60" height="30" class="tok" fill="#4A90D9" stroke="#2C5F8A"/>
  <text x="260" y="60" class="txt" fill="white">on</text>
  <rect x="300" y="40" width="60" height="30" class="tok" fill="#D94A4A" stroke="#A02C2C"/>
  <text x="330" y="60" class="txt" fill="white">[MASK]</text>
  <rect x="370" y="40" width="40" height="30" class="tok" fill="#4A90D9" stroke="#2C5F8A"/>
  <text x="390" y="60" class="txt" fill="white">.</text>
  <!-- Predictions -->
  <text x="120" y="100" class="txt" fill="#6BB86B" font-weight="bold">↓ cat</text>
  <text x="120" y="115" class="txt" fill="#888" font-size="9">P=0.92</text>
  <text x="330" y="100" class="txt" fill="#6BB86B" font-weight="bold">↓ the</text>
  <text x="330" y="115" class="txt" fill="#888" font-size="9">P=0.87</text>
  <!-- Label -->
  <text x="210" y="145" class="txt" fill="#888" font-size="9">BERT-style: predict masked tokens using bidirectional context</text>
</svg>