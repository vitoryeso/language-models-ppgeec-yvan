<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <style>
    .node { fill: #4A90D9; stroke: #2C5F8A; stroke-width: 2; }
    .line { stroke: #888; stroke-width: 1; opacity: 0.5; }
    .label { font-family: monospace; font-size: 11px; fill: #333; text-anchor: middle; }
  </style>
  <!-- Input layer -->
  <g class="input">
    <circle cx="60" cy="60" r="18" class="node"/>
    <circle cx="60" cy="120" r="18" class="node"/>
    <circle cx="60" cy="180" r="18" class="node"/>
    <circle cx="60" cy="240" r="18" class="node"/>
  </g>
  <!-- Hidden layer 1 -->
  <g class="hidden1">
    <circle cx="160" cy="50" r="18" class="node" fill="#6BB86B" stroke="#3D7A3D"/>
    <circle cx="160" cy="110" r="18" class="node" fill="#6BB86B" stroke="#3D7A3D"/>
    <circle cx="160" cy="170" r="18" class="node" fill="#6BB86B" stroke="#3D7A3D"/>
    <circle cx="160" cy="230" r="18" class="node" fill="#6BB86B" stroke="#3D7A3D"/>
    <circle cx="160" cy="270" r="18" class="node" fill="#6BB86B" stroke="#3D7A3D"/>
  </g>
  <!-- Hidden layer 2 -->
  <g class="hidden2">
    <circle cx="260" cy="80" r="18" class="node" fill="#E8A838" stroke="#B07A20"/>
    <circle cx="260" cy="150" r="18" class="node" fill="#E8A838" stroke="#B07A20"/>
    <circle cx="260" cy="220" r="18" class="node" fill="#E8A838" stroke="#B07A20"/>
  </g>
  <!-- Output layer -->
  <g class="output">
    <circle cx="350" cy="120" r="18" class="node" fill="#D94A4A" stroke="#A02C2C"/>
    <circle cx="350" cy="190" r="18" class="node" fill="#D94A4A" stroke="#A02C2C"/>
  </g>
  <!-- Connections input->hidden1 -->
  <g>
    <line x1="78" y1="60" x2="142" y2="50" class="line"/>
    <line x1="78" y1="60" x2="142" y2="110" class="line"/>
    <line x1="78" y1="60" x2="142" y2="170" class="line"/>
    <line x1="78" y1="120" x2="142" y2="50" class="line"/>
    <line x1="78" y1="120" x2="142" y2="110" class="line"/>
    <line x1="78" y1="120" x2="142" y2="170" class="line"/>
    <line x1="78" y1="120" x2="142" y2="230" class="line"/>
    <line x1="78" y1="180" x2="142" y2="110" class="line"/>
    <line x1="78" y1="180" x2="142" y2="170" class="line"/>
    <line x1="78" y1="180" x2="142" y2="230" class="line"/>
    <line x1="78" y1="180" x2="142" y2="270" class="line"/>
    <line x1="78" y1="240" x2="142" y2="170" class="line"/>
    <line x1="78" y1="240" x2="142" y2="230" class="line"/>
    <line x1="78" y1="240" x2="142" y2="270" class="line"/>
  </g>
  <!-- Connections hidden1->hidden2 -->
  <g>
    <line x1="178" y1="50" x2="242" y2="80" class="line"/>
    <line x1="178" y1="50" x2="242" y2="150" class="line"/>
    <line x1="178" y1="110" x2="242" y2="80" class="line"/>
    <line x1="178" y1="110" x2="242" y2="150" class="line"/>
    <line x1="178" y1="170" x2="242" y2="80" class="line"/>
    <line x1="178" y1="170" x2="242" y2="150" class="line"/>
    <line x1="178" y1="170" x2="242" y2="220" class="line"/>
    <line x1="178" y1="230" x2="242" y2="150" class="line"/>
    <line x1="178" y1="230" x2="242" y2="220" class="line"/>
    <line x1="178" y1="270" x2="242" y2="220" class="line"/>
  </g>
  <!-- Connections hidden2->output -->
  <g>
    <line x1="278" y1="80" x2="332" y2="120" class="line"/>
    <line x1="278" y1="80" x2="332" y2="190" class="line"/>
    <line x1="278" y1="150" x2="332" y2="120" class="line"/>
    <line x1="278" y1="150" x2="332" y2="190" class="line"/>
    <line x1="278" y1="220" x2="332" y2="120" class="line"/>
    <line x1="278" y1="220" x2="332" y2="190" class="line"/>
  </g>
  <text x="60" y="290" class="label">Input</text>
  <text x="160" y="20" class="label">Hidden 1</text>
  <text x="260" y="50" class="label">Hidden 2</text>
  <text x="350" y="240" class="label">Output</text>
</svg>