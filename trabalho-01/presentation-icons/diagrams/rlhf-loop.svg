<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <style>
    .box { rx: 10; stroke-width: 2; }
    .txt { font-family: monospace; font-size: 11px; fill: white; text-anchor: middle; }
    .ltxt { font-family: monospace; font-size: 10px; fill: #555; text-anchor: middle; }
    .arrow { stroke: #666; stroke-width: 2; fill: none; marker-end: url(#ar); }
    .bigarrow { stroke: #E8A838; stroke-width: 3; fill: none; marker-end: url(#abig); }
  </style>
  <defs>
    <marker id="ar" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#666"/>
    </marker>
    <marker id="abig" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#E8A838"/>
    </marker>
  </defs>
  <!-- Step 1: Prompts -->
  <rect x="20" y="30" width="120" height="50" class="box" fill="#4A90D9" stroke="#2C5F8A"/>
  <text x="80" y="52" class="txt" font-weight="bold">N Prompts</text>
  <text x="80" y="68" class="txt" font-size="9">Diverse Dataset</text>
  <line x1="145" y1="55" x2="175" y2="55" class="arrow"/>
  <!-- Step 2: Generate responses -->
  <rect x="180" y="20" width="140" height="70" class="box" fill="#6BB86B" stroke="#3D7A3D"/>
  <text x="250" y="45" class="txt" font-weight="bold">Base Model</text>
  <text x="250" y="60" class="txt" font-size="9">Generate K=5</text>
  <text x="250" y="75" class="txt" font-size="9">responses each</text>
  <line x1="325" y1="55" x2="355" y2="55" class="arrow"/>
  <!-- Step 3: Human ranking -->
  <rect x="360" y="20" width="120" height="70" class="box" fill="#E8A838" stroke="#B07A20"/>
  <text x="420" y="45" class="txt" font-weight="bold">Human</text>
  <text x="420" y="60" class="txt" font-size="9">Rank responses</text>
  <text x="420" y="75" class="txt" font-size="9">worst → best</text>
  <!-- Arrow down -->
  <line x1="420" y1="95" x2="420" y2="130" class="bigarrow"/>
  <!-- Step 4: Train Reward Model -->
  <rect x="340" y="135" width="160" height="55" class="box" fill="#9C27B0" stroke="#6A1B9A"/>
  <text x="420" y="158" class="txt" font-weight="bold">Reward Model</text>
  <text x="420" y="175" class="txt" font-size="9">Score: 1-5</text>
  <!-- Arrow left -->
  <line x1="340" y1="162" x2="300" y2="162" class="bigarrow"/>
  <!-- Step 5: RL Loop -->
  <rect x="80" y="125" width="215" height="75" class="box" fill="#D94A4A" stroke="#A02C2C"/>
  <text x="187" y="148" class="txt" font-size="14" font-weight="bold">RL Training Loop</text>
  <text x="187" y="168" class="txt" font-size="10">PPO / DPO Optimization</text>
  <text x="187" y="185" class="txt" font-size="9">Policy → Reward → Update</text>
  <!-- Feedback loop arrow -->
  <path d="M 187 200 L 187 240 L 40 240 L 40 55 L 20 55" class="arrow" stroke-dasharray="5,3"/>
  <text x="110" y="260" class="ltxt">Policy Update Loop</text>
  <!-- Final model -->
  <rect x="160" y="280" width="180" height="45" class="box" fill="#00897B" stroke="#005D4F"/>
  <text x="250" y="300" class="txt" font-weight="bold">Aligned Model</text>
  <text x="250" y="315" class="txt" font-size="9">RLHF-Tuned Assistant</text>
  <line x1="187" y1="200" x2="220" y2="280" class="arrow" stroke-dasharray="3,3"/>
</svg>