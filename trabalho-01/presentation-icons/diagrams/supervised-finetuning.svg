<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 220" width="440" height="220">
  <style>
    .box { rx: 8; stroke-width: 2; }
    .txt { font-family: monospace; font-size: 10px; fill: white; text-anchor: middle; }
    .ltxt { font-family: monospace; font-size: 9px; fill: #555; text-anchor: middle; }
    .arrow { stroke: #666; stroke-width: 2; fill: none; marker-end: url(#af); }
  </style>
  <defs>
    <marker id="af" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#666"/>
    </marker>
  </defs>
  <text x="220" y="20" class="ltxt" font-size="13" font-weight="bold" fill="#333">Supervised Finetuning (SFT)</text>
  <!-- Base Model -->
  <rect x="20" y="60" width="110" height="60" class="box" fill="#4A90D9" stroke="#2C5F8A"/>
  <text x="75" y="85" class="txt" font-weight="bold">Base Model</text>
  <text x="75" y="100" class="txt" font-size="8">Pre-trained LLM</text>
  <line x1="135" y1="90" x2="155" y2="90" class="arrow"/>
  <!-- + SFT Data -->
  <rect x="160" y="45" width="130" height="90" class="box" fill="#E8A838" stroke="#B07A20"/>
  <text x="225" y="70" class="txt" font-weight="bold">SFT Training</text>
  <text x="225" y="87" class="txt" font-size="8">Instruction-Response</text>
  <text x="225" y="100" class="txt" font-size="8">Pairs (Human-crafted)</text>
  <text x="225" y="120" class="txt" font-size="8">Cross-Entropy Loss</text>
  <line x1="295" y1="90" x2="320" y2="90" class="arrow"/>
  <!-- Finetuned Model -->
  <rect x="325" y="60" width="105" height="60" class="box" fill="#6BB86B" stroke="#3D7A3D"/>
  <text x="377" y="85" class="txt" font-weight="bold">SFT Model</text>
  <text x="377" y="100" class="txt" font-size="8">Chat-ready</text>
  <!-- Data examples -->
  <rect x="160" y="155" width="130" height="50" rx="6" fill="#FFF3E0" stroke="#E8A838" stroke-width="1"/>
  <text x="225" y="173" class="ltxt" fill="#B07A20">Q: What is ML?</text>
  <text x="225" y="188" class="ltxt" fill="#B07A20">A: ML is a branch of...</text>
</svg>