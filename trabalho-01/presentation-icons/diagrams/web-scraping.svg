<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="400" height="250">
  <style>
    .box { rx: 8; stroke-width: 2; }
    .txt { font-family: monospace; font-size: 11px; fill: #333; text-anchor: middle; }
    .arrow { stroke: #666; stroke-width: 2; fill: none; marker-end: url(#aw); }
  </style>
  <defs>
    <marker id="aw" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#666"/>
    </marker>
  </defs>
  <!-- Internet/Web -->
  <circle cx="70" cy="60" r="40" fill="#E8F0FE" stroke="#4A90D9" stroke-width="2"/>
  <text x="70" y="55" class="txt" font-weight="bold">WWW</text>
  <text x="70" y="70" class="txt" font-size="9">Web Pages</text>
  <!-- Arrow -->
  <line x1="115" y1="60" x2="155" y2="60" class="arrow"/>
  <!-- Crawler -->
  <rect x="160" y="30" width="110" height="60" class="box" fill="#FFF3E0" stroke="#E8A838"/>
  <text x="215" y="55" class="txt" font-weight="bold">Crawler</text>
  <text x="215" y="70" class="txt" font-size="9">Scrapy/BS4</text>
  <!-- Arrow down -->
  <line x1="215" y1="95" x2="215" y2="120" class="arrow"/>
  <!-- Parser -->
  <rect x="160" y="125" width="110" height="50" class="box" fill="#E8F5E9" stroke="#6BB86B"/>
  <text x="215" y="148" class="txt" font-weight="bold">Parser</text>
  <text x="215" y="163" class="txt" font-size="9">HTML→Text</text>
  <!-- Arrow right -->
  <line x1="275" y1="150" x2="305" y2="150" class="arrow"/>
  <!-- Storage -->
  <rect x="310" y="125" width="80" height="50" class="box" fill="#F3E5F5" stroke="#9C27B0"/>
  <text x="350" y="148" class="txt" font-weight="bold">Store</text>
  <text x="350" y="163" class="txt" font-size="9">Raw Data</text>
  <!-- URL Queue -->
  <rect x="290" y="30" width="100" height="45" class="box" fill="#FCE4EC" stroke="#D94A4A"/>
  <text x="340" y="50" class="txt" font-weight="bold">URL Queue</text>
  <text x="340" y="65" class="txt" font-size="9">BFS/DFS</text>
  <line x1="270" y1="45" x2="290" y2="45" class="arrow"/>
  <!-- Guardrails -->
  <rect x="50" y="160" width="90" height="40" class="box" fill="#FFEBEE" stroke="#D94A4A"/>
  <text x="95" y="178" class="txt" font-size="10" font-weight="bold">Guardrails</text>
  <text x="95" y="192" class="txt" font-size="8">robots.txt</text>
</svg>