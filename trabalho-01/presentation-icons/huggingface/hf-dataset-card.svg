<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 300" width="380" height="300">
  <style>
    .box { rx: 8; stroke-width: 2; }
    .txt { font-family: monospace; font-size: 10px; text-anchor: start; fill: #333; }
    .header { font-family: monospace; font-size: 12px; font-weight: bold; fill: white; text-anchor: middle; }
  </style>
  <!-- Card frame -->
  <rect x="20" y="20" width="340" height="260" rx="12" fill="white" stroke="#4A90D9" stroke-width="2.5"/>
  <!-- Header -->
  <rect x="20" y="20" width="340" height="45" rx="12" fill="#4A90D9"/>
  <rect x="20" y="45" width="340" height="20" fill="#4A90D9"/>
  <text x="190" y="48" class="header" font-size="14">🤗 Dataset Card</text>
  <!-- Dataset name -->
  <text x="40" y="90" class="txt" font-weight="bold" font-size="13">openai/gsm8k</text>
  <!-- Tags -->
  <rect x="40" y="100" width="50" height="18" rx="9" fill="#FCE4EC" stroke="#D94A4A" stroke-width="1"/>
  <text x="65" y="113" class="txt" text-anchor="middle" font-size="8" fill="#D94A4A">math</text>
  <rect x="98" y="100" width="55" height="18" rx="9" fill="#E8F5E9" stroke="#6BB86B" stroke-width="1"/>
  <text x="125" y="113" class="txt" text-anchor="middle" font-size="8" fill="#3D7A3D">8.79k</text>
  <rect x="161" y="100" width="45" height="18" rx="9" fill="#E8F0FE" stroke="#4A90D9" stroke-width="1"/>
  <text x="183" y="113" class="txt" text-anchor="middle" font-size="8" fill="#4A90D9">QA</text>
  <!-- Sample -->
  <rect x="40" y="130" width="300" height="70" rx="6" fill="#F5F5F5" stroke="#DDD" stroke-width="1"/>
  <text x="50" y="148" class="txt" font-size="8" fill="#666">question: "Natalia sold clips to</text>
  <text x="50" y="161" class="txt" font-size="8" fill="#666">48 friends... How many clips did</text>
  <text x="50" y="174" class="txt" font-size="8" fill="#666">Natalia sell altogether?"</text>
  <text x="50" y="190" class="txt" font-size="8" fill="#6BB86B">answer: "72"</text>
  <!-- Stats -->
  <text x="40" y="225" class="txt" font-size="9">📊 Train: 7,473 | Test: 1,319</text>
  <text x="40" y="242" class="txt" font-size="9">⬇ 850k downloads | ❤ 1.2k</text>
  <text x="40" y="259" class="txt" font-size="9">📜 License: MIT</text>
</svg>