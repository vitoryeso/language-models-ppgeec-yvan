<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 320" width="380" height="320">
  <style>
    .box { rx: 8; stroke-width: 2; }
    .txt { font-family: monospace; font-size: 10px; text-anchor: start; fill: #333; }
    .header { font-family: monospace; font-size: 12px; font-weight: bold; fill: #FF9D00; text-anchor: middle; }
  </style>
  <!-- Card frame -->
  <rect x="20" y="20" width="340" height="280" rx="12" fill="white" stroke="#FF9D00" stroke-width="2.5"/>
  <!-- HF Logo area -->
  <rect x="20" y="20" width="340" height="45" rx="12" fill="#FF9D00"/>
  <rect x="20" y="45" width="340" height="20" fill="#FF9D00"/>
  <text x="190" y="48" class="header" fill="white" font-size="14">🤗 Model Card</text>
  <!-- Model name -->
  <text x="40" y="90" class="txt" font-weight="bold" font-size="14" fill="#333">meta-llama/Llama-3-8B</text>
  <!-- Tags -->
  <rect x="40" y="100" width="70" height="18" rx="9" fill="#E8F0FE" stroke="#4A90D9" stroke-width="1"/>
  <text x="75" y="113" class="txt" text-anchor="middle" font-size="8" fill="#4A90D9">text-gen</text>
  <rect x="118" y="100" width="55" height="18" rx="9" fill="#E8F5E9" stroke="#6BB86B" stroke-width="1"/>
  <text x="145" y="113" class="txt" text-anchor="middle" font-size="8" fill="#3D7A3D">pytorch</text>
  <rect x="181" y="100" width="65" height="18" rx="9" fill="#FFF3E0" stroke="#E8A838" stroke-width="1"/>
  <text x="213" y="113" class="txt" text-anchor="middle" font-size="8" fill="#B07A20">english</text>
  <!-- Stats -->
  <text x="40" y="145" class="txt" font-size="9">⬇ 2.3M downloads/month</text>
  <text x="40" y="162" class="txt" font-size="9">❤ 15.2k likes</text>
  <text x="40" y="179" class="txt" font-size="9">📊 License: Llama 3 Community</text>
  <!-- Sections -->
  <line x1="40" y1="190" x2="340" y2="190" stroke="#EEE" stroke-width="1"/>
  <text x="40" y="210" class="txt" font-weight="bold">Model Description</text>
  <text x="40" y="225" class="txt" font-size="8" fill="#666">Large language model with 8B params...</text>
  <text x="40" y="245" class="txt" font-weight="bold">Training Data</text>
  <text x="40" y="260" class="txt" font-size="8" fill="#666">15T tokens, multilingual corpus</text>
  <text x="40" y="280" class="txt" font-weight="bold">Evaluation</text>
  <text x="40" y="295" class="txt" font-size="8" fill="#666">MMLU: 68.4 | HumanEval: 62.2</text>
</svg>