<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 180" width="480" height="180">
  <style>
    .box { rx: 8; stroke-width: 2; }
    .txt { font-family: monospace; font-size: 10px; text-anchor: middle; }
    .arrow { stroke: #FF9D00; stroke-width: 2; fill: none; marker-end: url(#ahf); }
  </style>
  <defs>
    <marker id="ahf" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#FF9D00"/>
    </marker>
  </defs>
  <text x="240" y="20" class="txt" font-size="13" font-weight="bold" fill="#FF9D00">🤗 Transformers Pipeline</text>
  <!-- Tokenizer -->
  <rect x="20" y="50" width="100" height="55" class="box" fill="#4A90D9" stroke="#2C5F8A"/>
  <text x="70" y="72" class="txt" fill="white" font-weight="bold">Tokenizer</text>
  <text x="70" y="88" class="txt" fill="white" font-size="8">Text → IDs</text>
  <line x1="125" y1="77" x2="150" y2="77" class="arrow"/>
  <!-- Model -->
  <rect x="155" y="40" width="110" height="75" class="box" fill="#FF9D00" stroke="#CC7D00"/>
  <text x="210" y="65" class="txt" fill="white" font-weight="bold">Model</text>
  <text x="210" y="80" class="txt" fill="white" font-size="8">Transformer</text>
  <text x="210" y="95" class="txt" fill="white" font-size="8">Forward Pass</text>
  <line x1="270" y1="77" x2="295" y2="77" class="arrow"/>
  <!-- Post-process -->
  <rect x="300" y="50" width="100" height="55" class="box" fill="#6BB86B" stroke="#3D7A3D"/>
  <text x="350" y="72" class="txt" fill="white" font-weight="bold">Decode</text>
  <text x="350" y="88" class="txt" fill="white" font-size="8">Logits → Text</text>
  <line x1="405" y1="77" x2="420" y2="77" class="arrow"/>
  <!-- Output -->
  <rect x="425" y="55" width="45" height="45" class="box" fill="#9C27B0" stroke="#6A1B9A"/>
  <text x="447" y="82" class="txt" fill="white" font-size="20">📝</text>
  <!-- Code snippet -->
  <rect x="70" y="130" width="340" height="35" rx="6" fill="#1E1E1E" stroke="#333" stroke-width="1"/>
  <text x="240" y="152" class="txt" fill="#6BB86B" font-size="9">pipe = pipeline("text-generation", model="...")</text>
</svg>